<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&amp;family=Space+Grotesk:wght@400;700&amp;display=swap');
      .title {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 56px;
        fill: #ffffff;
        letter-spacing: -1px;
      }
      .subtitle {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 400;
        font-size: 18px;
        fill: #8b949e;
        letter-spacing: 6px;
        text-transform: uppercase;
      }
      .tag {
        font-family: 'Outfit', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 14px;
        fill: #00f2fe;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .code-text {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #30363d;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070a" />
      <stop offset="50%" stop-color="#0c0f17" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>
    
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#7928ca" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />

  <!-- Grid Pattern -->
  <g opacity="0.6">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#1f242e" stroke-width="0.5" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#1f242e" stroke-width="0.5" />
  </g>

  <!-- Glowing Mesh Nodes (AI theme) -->
  <circle cx="200" cy="150" r="1" fill="#00f2fe" opacity="0.3" />
  <circle cx="350" cy="80" r="1.5" fill="#4facfe" opacity="0.4" />
  <circle cx="950" cy="120" r="2" fill="#00f2fe" opacity="0.5" filter="url(#glow)" />
  <circle cx="1050" cy="280" r="1" fill="#7928ca" opacity="0.3" />
  <circle cx="150" cy="320" r="2.5" fill="#00f2fe" opacity="0.2" />

  <!-- Abstract Wave Lines -->
  <path d="M-100,300 C300,200 500,380 900,250 C1100,180 1200,280 1300,200" fill="none" stroke="url(#grid-grad)" stroke-width="4" />
  <path d="M-50,220 C250,320 600,150 850,280 C1000,350 1150,200 1250,250" fill="none" stroke="url(#grid-grad)" stroke-width="2" />

  <!-- Code Snippet Overlays (Subtle) -->
  <text x="50" y="80" class="code-text">const ai = new Agent({ role: "Creator" });</text>
  <text x="50" y="100" class="code-text">await ai.optimize({ speed: "max", focus: "precision" });</text>
  <text x="920" y="320" class="code-text">import { PyTorch, TensorFlow } from "ai-core";</text>
  <text x="920" y="340" class="code-text">engine.deploy({ cluster: "kubernetes" });</text>

  <!-- Central Content -->
  <g transform="translate(100, 130)">
    <!-- Tag -->
    <text x="0" y="0" class="tag">System.init(active)</text>
    
    <!-- Title -->
    <text x="0" y="65" class="title">
      <tspan fill="url(#text-grad)">JERWIN TITUS</tspan>
    </text>
    
    <!-- Subtitle / Roles -->
    <text x="0" y="115" class="subtitle">AI Engineer • Full Stack Developer • Generative AI</text>
  </g>

  <!-- Glowing Accent Line at the Bottom -->
  <rect x="0" y="396" width="1200" height="4" fill="url(#text-grad)" opacity="0.8" />
</svg>
