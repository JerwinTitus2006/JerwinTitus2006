<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2af598" />
      <stop offset="100%" stop-color="#009efd" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="#0d1117" />
  
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.3" />
  
  <!-- AI Core Grid -->
  <path d="M35,50 L65,50 M50,35 L50,65 M39.5,39.5 L60.5,60.5 M39.5,60.5 L60.5,39.5" stroke="url(#grad)" stroke-width="0.5" opacity="0.2" />
  
  <!-- Nodes -->
  <circle cx="50" cy="35" r="2.5" fill="#00f2fe" />
  <circle cx="50" cy="65" r="2.5" fill="#00f2fe" />
  <circle cx="35" cy="50" r="2.5" fill="#00f2fe" />
  <circle cx="65" cy="50" r="2.5" fill="#00f2fe" />
  
  <!-- Connected Path (Infinity-like Brain Structure) -->
  <path d="M 50 38 C 38 38, 38 62, 50 62 C 62 62, 62 38, 50 38" fill="none" stroke="url(#grad)" stroke-width="3" filter="url(#glow)" />
  <path d="M 50 62 C 38 62, 38 38, 50 38 C 62 38, 62 62, 50 62" fill="none" stroke="url(#grad2)" stroke-width="2" />
  
  <!-- Center Core -->
  <circle cx="50" cy="50" r="5" fill="#ffffff" filter="url(#glow)" />
</svg>
