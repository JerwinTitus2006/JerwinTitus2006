<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" width="100%" height="100">
  <style>
    .text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      font-weight: 500;
      fill: #8b949e;
      letter-spacing: 4px;
      text-anchor: middle;
      text-transform: uppercase;
    }
    .bold-text {
      font-weight: 700;
      fill: #ffffff;
    }
  </style>
  <defs>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30363d" stop-opacity="0" />
      <stop offset="25%" stop-color="#30363d" stop-opacity="1" />
      <stop offset="50%" stop-color="#00f2fe" stop-opacity="1" />
      <stop offset="75%" stop-color="#30363d" stop-opacity="1" />
      <stop offset="100%" stop-color="#30363d" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Divider Line -->
  <line x1="0" y1="30" x2="800" y2="30" stroke="url(#line-grad)" stroke-width="1.5" />
  
  <!-- Outer glowing node -->
  <circle cx="400" cy="30" r="6" fill="#0d1117" stroke="#00f2fe" stroke-width="2" />
  <circle cx="400" cy="30" r="2" fill="#00f2fe" />
  
  <!-- Footer Text -->
  <text x="400" y="65" class="text">
    Designed &amp; Built by <tspan class="bold-text">Jerwin Titus</tspan> • © 2026 All Rights Reserved
  </text>
</svg>
