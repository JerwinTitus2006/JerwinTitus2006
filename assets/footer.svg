<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="120">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap');
    
    .footer-text {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      font-weight: 400;
      fill: #8b949e;
      letter-spacing: 3px;
      text-anchor: middle;
      text-transform: uppercase;
    }
    
    .bold-text {
      font-weight: 700;
      fill: #00f2fe;
      animation: textGlow 3s ease-in-out infinite alternate;
    }

    .rights-text {
      fill: #586069;
    }
    
    /* Central Pulse Node */
    .pulse-ring {
      fill: none;
      stroke: #00f2fe;
      stroke-width: 1.5;
      transform-origin: 400px 30px;
      animation: ripple 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
    }
    
    .pulse-ring-2 {
      animation-delay: 1s;
    }
    
    .center-node {
      fill: #00f2fe;
      stroke: #0d1117;
      stroke-width: 2;
      filter: drop-shadow(0 0 6px #00f2fe);
      animation: nodePulse 2s infinite alternate;
    }

    /* Cyber tech bars */
    .tech-bar {
      stroke: #30363d;
      stroke-width: 1;
      stroke-dasharray: 4 4;
    }

    /* Flowing Laser Line */
    .laser-line {
      stroke: url(#laser-grad);
      stroke-width: 2;
      stroke-dasharray: 150 450;
      animation: laserFlow 4s linear infinite;
    }
    
    @keyframes ripple {
      0% {
        transform: scale(0.5);
        opacity: 1;
        stroke: #00f2fe;
      }
      50% {
        stroke: #4facfe;
      }
      100% {
        transform: scale(2.5);
        opacity: 0;
        stroke: #6f42c1;
      }
    }
    
    @keyframes nodePulse {
      0% {
        transform: scale(0.9);
        fill: #00f2fe;
      }
      100% {
        transform: scale(1.1);
        fill: #4facfe;
      }
    }
    
    @keyframes laserFlow {
      0% {
        stroke-dashoffset: 600;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }

    @keyframes textGlow {
      0% {
        text-shadow: 0 0 2px rgba(0, 242, 254, 0.2);
        fill: #00f2fe;
      }
      100% {
        text-shadow: 0 0 8px rgba(0, 242, 254, 0.8), 0 0 12px rgba(79, 172, 254, 0.4);
        fill: #4facfe;
      }
    }
    
    @media (prefers-color-scheme: light) {
      .footer-text {
        fill: #586069;
      }
      .rights-text {
        fill: #8b949e;
      }
      .center-node {
        stroke: #ffffff;
      }
    }
  </style>
  
  <defs>
    <!-- Laser Flow Gradient -->
    <linearGradient id="laser-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30363d" stop-opacity="0.2" />
      <stop offset="35%" stop-color="#4facfe" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#00f2fe" stop-opacity="1" />
      <stop offset="65%" stop-color="#6f42c1" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#30363d" stop-opacity="0.2" />
    </linearGradient>
    
    <!-- Background Grid snippet for high-tech aesthetic -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#30363d" stroke-width="0.5" stroke-opacity="0.15" />
    </pattern>
  </defs>

  <!-- Background Grid (subtle) -->
  <rect width="100%" height="100" fill="url(#grid)" opacity="0.6" />
  
  <!-- High Tech Corner Decors -->
  <!-- Left tech bracket -->
  <path d="M 30,20 L 15,20 L 15,40" fill="none" stroke="#30363d" stroke-width="1" opacity="0.5" />
  <circle cx="15" cy="40" r="1.5" fill="#30363d" opacity="0.5" />
  
  <!-- Right tech bracket -->
  <path d="M 770,20 L 785,20 L 785,40" fill="none" stroke="#30363d" stroke-width="1" opacity="0.5" />
  <circle cx="785" cy="40" r="1.5" fill="#30363d" opacity="0.5" />

  <!-- Base Line -->
  <line x1="15" y1="30" x2="785" y2="30" stroke="#30363d" stroke-width="1" opacity="0.3" />
  
  <!-- Flowing Laser Line -->
  <line x1="15" y1="30" x2="785" y2="30" class="laser-line" />
  
  <!-- Pulsing Central Nodes (Live ripple elements) -->
  <circle cx="400" cy="30" r="10" class="pulse-ring" />
  <circle cx="400" cy="30" r="10" class="pulse-ring pulse-ring-2" />
  
  <!-- Solid Center Node -->
  <circle cx="400" cy="30" r="5" class="center-node" />
  
  <!-- Cyber decorative crosshair lines around center node -->
  <line x1="380" y1="30" x2="390" y2="30" stroke="#00f2fe" stroke-width="1" opacity="0.7" />
  <line x1="410" y1="30" x2="420" y2="30" stroke="#00f2fe" stroke-width="1" opacity="0.7" />
  
  <!-- Footer Text -->
  <text x="400" y="75" class="footer-text">
    Designed &amp; Built by <tspan class="bold-text">Jerwin Titus</tspan>
  </text>
  
  <text x="400" y="95" class="footer-text rights-text" style="font-size: 9px; letter-spacing: 2px;">
    © 2026 • AI Engineer &amp; Full Stack Developer • All Rights Reserved
  </text>
</svg>
