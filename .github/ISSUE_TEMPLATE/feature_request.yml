name: Feature Request
description: Propose a new feature or enhancement for this profile
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make this profile or its workflows even better? Let me know!
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: A clear and concise description of what the feature or enhancement is.
      placeholder: e.g., Add a new section for competitive programming platforms.
    validations:
      required: true
  - type: textarea
    id: problem-solved
    attributes:
      label: Problem Solved
      description: Is your feature request related to a problem? Please describe.
      placeholder: e.g., I'm trying to showcase my Codeforces rating but there's no native section.
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
