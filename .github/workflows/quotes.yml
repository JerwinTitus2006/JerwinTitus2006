# Developer Quote Auto-Updater Workflow
# Fetches a random developer quote from an API (with fallback) and updates README.md

name: Update Developer Quote

on:
  # Run daily at midnight
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

jobs:
  update-quote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # Step 3: Run Quote Updater Script
      - name: Run Quote Updater
        run: |
          python -c '
          import re
          import urllib.request
          import json
          import random

          quotes = [
              {"quote": "I expect disappointment, so I can never be disappointed 🙃", "author": "MJ (Spider-Man: No Way Home)"},
              {"quote": "Talk is cheap. Show me the code.", "author": "Linus Torvalds"},
              {"quote": "Programs must be written for people to read, and only incidentally for machines to execute.", "author": "Harold Abelson"},
              {"quote": "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.", "author": "Martin Fowler"},
              {"quote": "First, solve the problem. Then, write the code.", "author": "John Johnson"},
              {"quote": "Experience is the name everyone gives to their mistakes.", "author": "Oscar Wilde"},
              {"quote": "Code is like humor. When you have to explain it, it’s bad.", "author": "Cory House"},
              {"quote": "Before software can be reusable it first has to be usable.", "author": "Ralph Johnson"},
              {"quote": "Make it work, make it right, make it fast.", "author": "Kent Beck"},
              {"quote": "Simplicity is the soul of efficiency.", "author": "Austin Freeman"},
              {"quote": "The best way to predict the future is to invent it.", "author": "Alan Kay"},
              {"quote": "AI will not replace developers, but developers who use AI will replace those who do not.", "author": "Tech Proverb"},
              {"quote": "The only way to learn a new programming language is by writing programs in it.", "author": "Dennis Ritchie"},
              {"quote": "Computers are good at following instructions, but not at reading your mind.", "author": "Donald Knuth"}
          ]

          q = random.choice(quotes)
          quote_text = q["quote"]
          quote_author = q["author"]

          quote_md = f"\n> *\"{quote_text}\"*\n>\n> — **{quote_author}**\n"

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = r"<!--START_SECTION:quote-->.*?<!--END_SECTION:quote-->"
          replacement = f"<!--START_SECTION:quote-->{quote_md}<!--END_SECTION:quote-->"
          new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)
          '

      # Step 4: Commit and Push Changes
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes in README.md"
          else
            git commit -m "chore: update random developer quote [skip ci]"
            git push
          fi
