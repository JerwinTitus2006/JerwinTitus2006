# WakaTime Coding Stats Auto-Updater Workflow
# Updates coding hours, top languages used, and operating system stats from WakaTime into the README.md
# Requires secrets: WAKATIME_API_KEY

name: Update WakaTime Stats

on:
  # Run every day at 12:00 AM UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

jobs:
  update-wakatime:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v7

      # Step 2: Run WakaTime Readme Stats Action
      - name: Update WakaTime Readme Stats
        uses: anmol0013/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_OS: "true"
          SHOW_PROJECTS: "true"
          SHOW_TIME_VAL: "true"
          SHOW_TITLE: "true"
          SHOW_LINES_OF_CODE: "true"
          SHOW_PROFILE_VIEWS: "true"
          SHOW_COMMIT: "true"
          SHOW_DAYS_OF_WEEK: "true"
          SHOW_LANGUAGE_PER_REPO: "true"
          SHOW_SHORT_INFO: "true"
          SHOW_LOC_CHART: "true"
          LOCALE: "en"
