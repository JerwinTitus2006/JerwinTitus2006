# Holopin Badge Cacher Workflow
# Downloads the Holopin badges image SVG and saves it locally to avoid broken links during external API downtime

name: Cache Holopin Badges

on:
  # Run daily at midnight
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

jobs:
  cache-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Ensure assets directory exists
      - name: Ensure Assets Directory Exists
        run: mkdir -p assets

      # Step 3: Fetch Holopin Badge SVG (using placeholder username, fallback to jerwintitus)
      - name: Fetch SVG
        run: |
          curl -s -L "https://holopin.me/JerwinTitus2006/badge.svg" -o assets/holopin.svg || curl -s -L "https://holopin.me/jerwintitus/badge.svg" -o assets/holopin.svg

      # Step 4: Commit and Push if updated
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/holopin.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: cache latest holopin badge [skip ci]"
            git push
          fi
